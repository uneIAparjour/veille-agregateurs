name: Veille quotidienne outils IA

on:
  schedule:
    - cron: '0 18 * * *'  # 18h UTC = 20h heure française (été) / 19h (hiver)
  workflow_dispatch:        # déclenchement manuel

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install requests feedparser beautifulsoup4 lxml

      - name: Récupérer les outils
        run: python fetch_tools.py

      - name: Vérifier si tools.json a changé
        id: check
        run: |
          git diff --quiet tools.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit et push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools.json
          git commit -m "Veille du $(date +'%d/%m/%Y') — $(python -c "import json; d=json.load(open('tools.json')); print(str(d['count'])+' outils')")"
          git push
